<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שעות נוספות</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    padding: 16px;
    max-width: 500px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 1.4rem;
    margin-bottom: 12px;
  }
  .nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
  }
  .nav button {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
    color: #007aff;
  }
  .nav button:hover { background: #e8e8ed; }
  .nav .month-label {
    font-size: 1.1rem;
    font-weight: 600;
    min-width: 140px;
    text-align: center;
  }

  .totals {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .totals .chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .chip.done { background: #e8f5e9; color: #2e7d32; }
  .chip.confirmed { background: #e3f2fd; color: #1565c0; }
  .chip.requested { background: #fff3e0; color: #e65100; }
  .chip.total { background: #f3e5f5; color: #6a1b9a; }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day-header {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: #86868b;
    padding: 6px 0;
  }
  .day {
    aspect-ratio: 1;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    background: #fff;
    position: relative;
    min-height: 48px;
  }
  .day.empty { background: transparent; }
  .day.today { border: 2px solid #007aff; }
  .day .num { font-weight: 600; }
  .day .hours-badge {
    font-size: 0.6rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 8px;
    margin-top: 2px;
  }
  .day.status-done { background: #e8f5e9; }
  .day.status-done .hours-badge { background: #2e7d32; color: #fff; }
  .day.status-confirmed { background: #e3f2fd; }
  .day.status-confirmed .hours-badge { background: #1565c0; color: #fff; }
  .day.status-requested { background: #fff3e0; }
  .day.status-requested .hours-badge { background: #e65100; color: #fff; }
  .day.status-tbd { background: #fce4ec; }
  .day.status-tbd .hours-badge { background: #ad1457; color: #fff; }

  .day .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    background: #1d1d1f;
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 0.7rem;
    white-space: nowrap;
    z-index: 10;
    text-align: center;
  }
  .day:hover .tooltip, .day:active .tooltip { display: block; }

  .legend {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.75rem;
    color: #86868b;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .legend-dot.done { background: #2e7d32; }
  .legend-dot.confirmed { background: #1565c0; }
  .legend-dot.requested { background: #e65100; }
  .legend-dot.tbd { background: #ad1457; }

  .details {
    margin-top: 20px;
  }
  .details h3 {
    font-size: 0.9rem;
    margin-bottom: 8px;
    color: #86868b;
  }
  .detail-card {
    background: #fff;
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .detail-card .info { font-size: 0.85rem; }
  .detail-card .info .location { color: #86868b; font-size: 0.75rem; }
  .detail-card .status-tag {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
  }
  .status-tag.done { background: #e8f5e9; color: #2e7d32; }
  .status-tag.confirmed { background: #e3f2fd; color: #1565c0; }
  .status-tag.requested { background: #fff3e0; color: #e65100; }
  .status-tag.tbd { background: #fce4ec; color: #ad1457; }
</style>
</head>
<body>

<div class="header">
  <h1>שעות נוספות</h1>
  <div class="nav">
    <button id="prev">→</button>
    <span class="month-label" id="monthLabel"></span>
    <button id="next">←</button>
  </div>
</div>

<div class="totals" id="totals"></div>
<div class="calendar" id="calendar"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot done"></div>בוצע</div>
  <div class="legend-item"><div class="legend-dot confirmed"></div>מאושר</div>
  <div class="legend-item"><div class="legend-dot requested"></div>נשלח</div>
  <div class="legend-item"><div class="legend-dot tbd"></div>TBD</div>
</div>

<div class="details" id="details"></div>

<script>
// ===== DATA — edit here to add/update entries =====
const entries = [
  // April 2026
  { date: '2026-04-10', time: '—', location: '—', status: 'done', hours: 4 },
  { date: '2026-04-13', time: '3:30pm', location: 'תלפיות', status: 'confirmed', hours: 2 },
  { date: '2026-04-17', time: '—', location: '—', status: 'confirmed', hours: 4 },
  { date: '2026-04-23', time: '4pm', location: 'תלפיות', status: 'confirmed', hours: 2 },

  // May 2026
  { date: '2026-05-01', time: '8:00-12:00', location: 'תלפיות', status: 'requested', hours: 4 },
  { date: '2026-05-08', time: '8:00-12:00', location: 'תלפיות', status: 'requested', hours: 4 },
  // Neve Yaakov Mondays — TBD, decide by Apr 19
  { date: '2026-05-04', time: '3:15-7:15', location: 'נווה יעקב', status: 'tbd', hours: 4 },
  { date: '2026-05-11', time: '3:15-7:15', location: 'נווה יעקב', status: 'tbd', hours: 4 },
  { date: '2026-05-18', time: '3:15-7:15', location: 'נווה יעקב', status: 'tbd', hours: 4 },
  { date: '2026-05-25', time: '3:15-7:15', location: 'נווה יעקב', status: 'tbd', hours: 4 },
];

const hebrewMonths = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const dayHeaders = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
const statusLabels = { done: 'בוצע', confirmed: 'מאושר', requested: 'נשלח', tbd: 'TBD' };

let currentYear = 2026;
let currentMonth = 3; // April (0-indexed)

function getEntries(year, month) {
  return entries.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
}

function render() {
  const label = `${hebrewMonths[currentMonth]} ${currentYear}`;
  document.getElementById('monthLabel').textContent = label;

  const monthEntries = getEntries(currentYear, currentMonth);
  const entryMap = {};
  monthEntries.forEach(e => {
    const day = new Date(e.date).getDate();
    entryMap[day] = e;
  });

  // Totals
  const totals = { done: 0, confirmed: 0, requested: 0, tbd: 0 };
  monthEntries.forEach(e => { totals[e.status] = (totals[e.status] || 0) + e.hours; });
  const totalAll = totals.done + totals.confirmed + totals.requested + totals.tbd;

  let totalsHtml = '';
  if (totals.done) totalsHtml += `<span class="chip done">בוצע: ${totals.done} שע׳</span>`;
  if (totals.confirmed) totalsHtml += `<span class="chip confirmed">מאושר: ${totals.confirmed} שע׳</span>`;
  if (totals.requested) totalsHtml += `<span class="chip requested">נשלח: ${totals.requested} שע׳</span>`;
  if (totals.tbd) totalsHtml += `<span class="chip total">TBD: ${totals.tbd} שע׳</span>`;
  if (totalAll) totalsHtml += `<span class="chip total">סה״כ: ${totalAll} שע׳</span>`;
  document.getElementById('totals').innerHTML = totalsHtml;

  // Calendar grid
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();

  let html = dayHeaders.map(d => `<div class="day-header">${d}</div>`).join('');

  for (let i = 0; i < firstDay; i++) {
    html += '<div class="day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const entry = entryMap[d];
    const isToday = today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d;
    let cls = 'day';
    if (isToday) cls += ' today';
    if (entry) cls += ` status-${entry.status}`;

    let inner = `<span class="num">${d}</span>`;
    if (entry) {
      inner += `<span class="hours-badge">${entry.hours} שע׳</span>`;
      inner += `<div class="tooltip">${entry.time} · ${entry.location}</div>`;
    }
    html += `<div class="${cls}">${inner}</div>`;
  }

  document.getElementById('calendar').innerHTML = html;

  // Details list
  let detailsHtml = '';
  if (monthEntries.length) {
    detailsHtml = `<h3>פירוט החודש</h3>`;
    monthEntries.sort((a, b) => a.date.localeCompare(b.date)).forEach(e => {
      const d = new Date(e.date);
      const dayStr = `${d.getDate()}/${d.getMonth() + 1}`;
      detailsHtml += `
        <div class="detail-card">
          <div class="info">
            <div>${dayStr} · ${e.time}</div>
            <div class="location">${e.location} · ${e.hours} שעות</div>
          </div>
          <span class="status-tag ${e.status}">${statusLabels[e.status]}</span>
        </div>`;
    });
  }
  document.getElementById('details').innerHTML = detailsHtml;
}

document.getElementById('prev').addEventListener('click', () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
});
document.getElementById('next').addEventListener('click', () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
});

render();
</script>
</body>
</html>
